<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>68rz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#000;
color:#fff;
overflow:hidden;
}

#stars{
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
animation:stars 25s linear infinite;
opacity:.4;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-500px);}
}

#cursor-glow{
position:fixed;
width:180px;
height:180px;
border-radius:50%;
background:rgba(255,255,255,.08);
filter:blur(60px);
pointer-events:none;
transform:translate(-50%,-50%);
}

#enter{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
}

#enter h1{
font-size:70px;
text-shadow:0 0 20px white;
}

#enter p{
font-size:14px;
margin-top:10px;
color:#aaa;
}

#main{
display:none;
height:100vh;
overflow:auto;
padding:25px;
text-align:center;
}

.logo{
font-size:42px;
margin:20px 0;
text-shadow:0 0 20px white;
}

.card{
width:350px;
max-width:95%;
margin:25px auto;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(15px);
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
cursor:pointer;
transition:transform 0.3s ease;
}

.avatar:hover{
transform:scale(1.05);
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:white;
border:1px solid #444;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.btn:hover{
box-shadow:0 0 20px white;
}

.icon{
width:22px;
height:22px;
border-radius:6px;
}

#musicBtn{
position:fixed;
top:15px;
right:15px;
z-index:9999;
padding:10px 15px;
background:#111;
color:white;
border:1px solid #444;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
gap:8px;
}

#musicBtn img{
width:22px;
height:22px;
border-radius:4px;
}

#volume{
position:fixed;
top:15px;
right:160px;
z-index:9999;
width:120px;
-webkit-appearance:none;
appearance:none;
background:transparent;
cursor:pointer;
}

#volume::-webkit-slider-runnable-track{
height:4px;
background:#333;
border-radius:2px;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:14px;
height:14px;
border-radius:50%;
background:white;
margin-top:-5px;
}

/* Scrollbar für Handy */
#main::-webkit-scrollbar{
width:6px;
}

#main::-webkit-scrollbar-track{
background:transparent;
}

#main::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.3);
border-radius:3px;
}

/* Founder oben links */
.founder-badge{
position:fixed;
top:15px;
left:15px;
z-index:9999;
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:8px 15px 8px 8px;
border-radius:30px;
}

.founder-badge img{
width:36px;
height:36px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
cursor:pointer;
}

.founder-badge span{
font-size:13px;
color:#aaa;
}

/* Parallax-Klasse */
.parallax{
transition:transform 0.1s ease-out;
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="cursor-glow"></div>

<!-- ENTER BEREICH – zentriert und größer -->
<div id="enter">
<h1>CLICK TO ENTER</h1>
<p>sound on recommended</p>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- MUSIK BUTTON mit Icon oben rechts -->
<button id="musicBtn">
<img id="musicIcon" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519615974465343488/lautsprecher.png?ex=6a3e3429&is=6a3ce2a9&hm=c1937dd4ef02deddffdc477c4d1c2ef4d6c5f9ce6c55fa8a50dfb885566c9c45&">
<span id="musicLabel">Musik AN</span>
</button>

<!-- VOLUME SLIDER – weisser Kreis -->
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">

<!-- FOUNDER BADGE oben links – ohne "Founder" Text unten -->
<div class="founder-badge" id="founderBadge">
<img class="avatar parallax" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519487604423262309/458ab107ae9770e16a9d3aca2e09bb6b_1.jpg?ex=6a3dbc9b&is=6a3c6b1b&hm=9ecc1040e809ecd93aa4d619417f24c1441b3c1dd244015fa6fa8b661b6bfb43&">
<span>FAYYSI • Founder</span>
</div>

<div id="main">
<h1 class="logo">COMBOSS FRIEND GROUP</h1>

<div class="card">
<img class="avatar parallax" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519487604423262309/458ab107ae9770e16a9d3aca2e09bb6b_1.jpg?ex=6a3dbc9b&is=6a3c6b1b&hm=9ecc1040e809ecd93aa4d619417f24c1441b3c1dd244015fa6fa8b661b6bfb43&">
<h2>FAYYSI</h2>
<!-- Founder Text unten ENTFERNT -->
<button class="btn" onclick="copyText('68rz')">
<img class="icon" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519486310283214914/logo.png?ex=6a3dbb67&is=6a3c69e7&hm=91663aaf63084ac9b8e32a4632362c44ba7115b8bf116a897e4a88f107e682e1&">
Discord: 68rz
</button>
<button class="btn" onclick="copyText('Fayysi')">
<img class="icon" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519486307347206204/roblox.png?ex=6a3dbb66&is=6a3c69e6&hm=4f9dc889d37ca76efb6934b7918774071a1cd69b52fe05deaa776bcb75bd4e7b&">
Roblox: Fayysi
</button>
</div>

<div class="card">
<h2>LAYYSI</h2>
<p>sklave</p>
<p>Später hinzufügen</p>
</div>
</div>

<script>
const enter=document.getElementById("enter");
const main=document.getElementById("main");
const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");
const musicIcon=document.getElementById("musicIcon");
const musicLabel=document.getElementById("musicLabel");
const volume=document.getElementById("volume");

// Maus-Glow
document.addEventListener("mousemove",(e)=>{
const glow=document.getElementById("cursor-glow");
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

// ENTER klicken
enter.onclick=()=>{
enter.style.display="none";
main.style.display="block";
music.play();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519616016361984120/lautsprecher_2.png?ex=6a3e3433&is=6a3ce2b3&hm=358d45588b016226dae272b94e373766b77c4631668fbeb1802659ff79ad8626&";
musicLabel.textContent="Musik AN";
};

// Kopieren
function copyText(text){
navigator.clipboard.writeText(text);
alert("Kopiert: "+text);
}

// Musik Button
musicBtn.onclick=()=>{
if(music.paused){
music.play();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519616016361984120/lautsprecher_2.png?ex=6a3e3433&is=6a3ce2b3&hm=358d45588b016226dae272b94e373766b77c4631668fbeb1802659ff79ad8626&";
musicLabel.textContent="Musik AN";
}else{
music.pause();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519615974465343488/lautsprecher.png?ex=6a3e3429&is=6a3ce2a9&hm=c1937dd4ef02deddffdc477c4d1c2ef4d6c5f9ce6c55fa8a50dfb885566c9c45&";
musicLabel.textContent="Musik AUS";
}
};

// Volume Slider
volume.addEventListener("input",(e)=>{
music.volume=e.target.value;
});

// BILDER ANKLICKBAR – öffnet Bild in neuem Tab
document.addEventListener("click",(e)=>{
if(e.target.classList.contains("avatar")){
const src = e.target.src;
if(src){
window.open(src, "_blank");
}
}
});

// PARALLAX-EFFEKT für alle .parallax Elemente
document.addEventListener("mousemove",(e)=>{
const x = (e.clientX / window.innerWidth - 0.5) * 6;
const y = (e.clientY / window.innerHeight - 0.5) * 6;
document.querySelectorAll(".parallax").forEach(el=>{
el.style.transform=`translate(${x}px, ${y}px)`;
});
});
</script>
</body>
</html>
